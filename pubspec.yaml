name: passengers_mobile_app
description: A new Flutter project for WuloPay cashless taxi fare collection.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  provider: ^6.1.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2
  intl: ^0.20.2
  pinput: ^4.0.0
  http: ^1.2.1
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  easy_localization: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
